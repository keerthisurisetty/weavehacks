# Tooling config for the whole repo. Backend runtime deps live in backend/requirements.txt.
# Run ruff / mypy / pytest from the repo root; pytest picks up backend/ via the config below.

[tool.ruff]
line-length = 100
target-version = "py311"
extend-exclude = ["frontend", ".venv"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "ASYNC"]
ignore = [
    "E501",     # wrapping is the formatter's job
    "ASYNC109", # we intentionally expose timeout= on the bus aggregators (safe default)
]

[tool.mypy]
python_version = "3.11"
mypy_path = "backend"
explicit_package_bases = true
namespace_packages = true
ignore_missing_imports = true # weave / redisvl / ag_ui ship without complete stubs

[tool.pytest.ini_options]
asyncio_mode = "auto"
pythonpath = ["backend"]
testpaths = ["backend/tests"]
markers = [
    "agent: hits a real model — token cost (Tier 2)",
    "eval: runs the Weave evaluation — token cost (Tier 3)",
    "smoke: end-to-end smoke (Tier 4)",
]
